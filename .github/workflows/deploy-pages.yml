# Veröffentlicht die Anwendung automatisch über GitHub Pages.
# Läuft bei jedem Push auf den Branch "main" und aktiviert Pages
# beim ersten Lauf selbstständig (enablement: true).
name: GitHub Pages veroeffentlichen

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: GitHub Pages konfigurieren (aktiviert Pages beim ersten Lauf)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Seite als Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
